plugins {
    id 'com.android.application'
}

android {
    namespace 'com.navi.portfolio'
    compileSdk 35

    defaultConfig {
        applicationId 'com.navi.portfolio'
        minSdk 23
        targetSdk 35
        versionCode 11
        versionName '2.0-quant-test'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

android.sourceSets.main.java.exclude '**/HomeActivity.java'
